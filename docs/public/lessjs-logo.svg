<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="100%">
  <defs>
    <style>
      .mark { fill: #000; }
      .wordmark { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 500; font-size: 56px; fill: #000; }
      .tagline { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 400; font-size: 18px; fill: #888780; letter-spacing: 3px; }
      @media (prefers-color-scheme: dark) {
        .mark { fill: #fff; }
        .wordmark { fill: #fff; }
      }
    </style>
  </defs>
  <g transform="translate(80, 100)">
    <rect class="mark" x="-32" y="-32" width="64" height="64" rx="4" transform="rotate(45)" opacity="0.3"/>
    <rect class="mark" x="-14" y="-14" width="28" height="28" rx="2" transform="rotate(45)"/>
    <circle class="mark" cx="0" cy="0" r="3" opacity="0.5"/>
  </g>
  <text class="wordmark" x="180" y="96">LessJS</text>
  <text class="tagline" x="182" y="132">Less is More</text>
</svg>
