name: Publish to JSR

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/deno.json'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Build @kissjs/ui
        working-directory: packages/kiss-ui
        run: deno task build

      - name: Publish missing package versions
        shell: bash
        run: |
          set -euo pipefail

          publish_if_missing() {
            local pkg="$1"
            local dir="$2"
            local version
            version="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' "$dir/deno.json" | head -n 1)"

            if deno info --no-config "jsr:${pkg}@${version}" >/dev/null 2>&1; then
              echo "[JSR] ${pkg}@${version} already exists; skipping."
              return 0
            fi

            echo "[JSR] Publishing ${pkg}@${version}"
            (cd "$dir" && deno publish --allow-dirty)
          }

          publish_if_missing "@kissjs/rpc" "packages/kiss-rpc"
          publish_if_missing "@kissjs/ui" "packages/kiss-ui"
          publish_if_missing "@kissjs/adapter-lit" "packages/kiss-adapter-lit"
          publish_if_missing "@kissjs/core" "packages/kiss-core"
          publish_if_missing "@kissjs/create" "packages/create-kiss"
