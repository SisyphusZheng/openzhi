name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run type check
        run: deno check packages/kiss-core/src/index.ts packages/kiss-rpc/src/index.ts packages/kiss-ui/src/index.ts

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Build kiss-ui (needed for scanPackageIslands test)
        working-directory: packages/kiss-ui
        run: deno task build
      - name: Run kiss-core tests
        run: deno test packages/kiss-core/__tests__/ --allow-read --allow-write --allow-env --allow-run

  test-rpc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run kiss-rpc tests
        run: deno test packages/kiss-rpc/__tests__/ --allow-read --allow-write

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run kiss-ui tests
        run: deno test packages/kiss-ui/__tests__/ --allow-read --allow-write --allow-env

  test-create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
      - name: Install dependencies
        run: deno install --node-modules-dir
      - name: Run create-kiss tests
        run: deno test packages/create-kiss/__tests__/ --allow-read --allow-write --allow-env --allow-run
