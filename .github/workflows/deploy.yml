name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        working-directory: docs
        run: deno install

      - name: Build docs site
        working-directory: docs
        run: deno run -A npm:vite build

      - name: Deploy to gh-pages branch
        run: |
          # Create a fresh git repo from the dist directory and force-push
          # This avoids any contamination from the source repo
          cd docs/dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "kiss.js.org" > CNAME
          git add -A
          git commit -m "Deploy KISS docs site — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
