// DSD Polyfill (Firefox, older browsers)
(function() {
  try {
    const t = document.createElement('template');
    t.setAttribute('shadowrootmode', 'open');
    if ('shadowRootMode' in t) return; // Native support
  } catch {}
  
  const attachDSD = (root) => {
    root.querySelectorAll('template[shadowrootmode]').forEach(tpl => {
      const parent = tpl.parentNode;
      if (!parent || parent.shadowRoot) return;
      try {
        const mode = tpl.getAttribute('shadowrootmode');
        const opts = { mode: mode === 'open' ? 'open' : 'closed' };
        if (tpl.hasAttribute('shadowrootdelegatesfocus')) opts.delegatesFocus = true;
        const sr = parent.attachShadow(opts);
        sr.innerHTML = tpl.innerHTML;
        tpl.remove();
        attachDSD(sr); // Handle nested DSD
      } catch {}
    });
  };
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => attachDSD(document));
  } else {
    attachDSD(document);
  }
})();

          <section class="band">
            <h2>What LessJS Is</h2>
            <div>
              <p>
                LessJS
                的核心不是重新发明组件框架，而是把浏览器已经拥有的能力组织成一条小而清晰的生产路径：
                路由映射页面组件，SSR 生成 DSD HTML，构建阶段抽取 island client entry， SSG
                产出可以直接部署的静态站点。
              </p>
              <p>
                这让它天然适合文档、博客、内容站、营销页和轻量 serverless
                应用。大型后台和高频数据应用可以做， 但必须等 actions、session、validation、revalidation
                等生产约定更成熟后再作为主打场景。
              </p>
            </div>
          </section>

          <section class="band">
            <h2>What LessJS Is Not</h2>
            <div>
              <p>
                它不是 React/Vue 风格的整页 hydration 框架，也不应该提前承诺 ISR、零 JS 全站交互、
                或生产级 compiler 消除 Lit。LessJS 更愿意把边界写清楚，把已有能力做稳。
              </p>
              <p>
                当前稳定重心是 <code>SSG + DSD + Hono API + package islands</code>。
                未来能力会围绕这些边界渐进增加，而不是把所有现代框架关键词一次性塞进文档。
              </p>
            </div>
